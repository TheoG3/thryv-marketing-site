<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -28 268 116" role="img" aria-label="Thryv Marketing Solutions">
  <!--
    V1 — Full Color Horizontal
    Use on: nav, email headers, documents, white/light backgrounds
    Transparent background
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&amp;display=swap');
    </style>
  </defs>

  <!-- THRY wordmark in blue -->
  <text y="68"
    font-family="Montserrat, 'Arial Black', Arial, sans-serif"
    font-weight="800" font-size="68" fill="#2456B4">THRY</text>

  <!-- V — left diagonal stroke in blue -->
  <!-- Runs from cap-top-left of V down to V bottom point -->
  <polygon points="181,22 192,17 215,64 203,70" fill="#2456B4"/>

  <!-- V — right diagonal + arrow shaft in orange -->
  <!-- Starts at V bottom, rises past cap height as growth arrow -->
  <polygon points="204,66 216,70 241,-3 229,-8" fill="#F59022"/>

  <!-- Arrowhead -->
  <polygon points="249,-20 234,-10 255,-3" fill="#F59022"/>

  <!-- Subtitle: MARKETING in blue, SOLUTIONS in orange -->
  <text y="88"
    font-family="Montserrat, Arial, sans-serif"
    font-weight="700" font-size="13" letter-spacing="2.8">
    <tspan fill="#2456B4">MARKETING </tspan><tspan fill="#F59022">SOLUTIONS</tspan>
  </text>
</svg>
