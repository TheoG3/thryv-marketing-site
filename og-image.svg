<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070F2B"/>
      <stop offset="60%" stop-color="#0F3272"/>
      <stop offset="100%" stop-color="#1a3a7a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle orange glow top-right -->
  <ellipse cx="980" cy="160" rx="420" ry="320" fill="url(#glow)"/>

  <!-- Grid dots (decorative) -->
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="900" cy="80" r="3"/><circle cx="950" cy="80" r="3"/><circle cx="1000" cy="80" r="3"/><circle cx="1050" cy="80" r="3"/><circle cx="1100" cy="80" r="3"/><circle cx="1150" cy="80" r="3"/>
    <circle cx="900" cy="130" r="3"/><circle cx="950" cy="130" r="3"/><circle cx="1000" cy="130" r="3"/><circle cx="1050" cy="130" r="3"/><circle cx="1100" cy="130" r="3"/><circle cx="1150" cy="130" r="3"/>
    <circle cx="900" cy="180" r="3"/><circle cx="950" cy="180" r="3"/><circle cx="1000" cy="180" r="3"/><circle cx="1050" cy="180" r="3"/><circle cx="1100" cy="180" r="3"/><circle cx="1150" cy="180" r="3"/>
    <circle cx="900" cy="230" r="3"/><circle cx="950" cy="230" r="3"/><circle cx="1000" cy="230" r="3"/><circle cx="1050" cy="230" r="3"/><circle cx="1100" cy="230" r="3"/><circle cx="1150" cy="230" r="3"/>
  </g>

  <!-- THRYV Logomark — scaled up, centered vertically at x=80 -->
  <!-- Scale factor ~2.4x from v3 icon (52px → 125px) -->
  <!-- Blue rounded square background -->
  <rect x="80" y="210" width="125" height="125" rx="24" fill="#1B4FA8"/>
  <!-- V left leg white -->
  <line x1="102" y1="232" x2="142" y2="312" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <!-- V right leg + arrow orange -->
  <line x1="142" y1="312" x2="176" y2="225" stroke="#F5A623" stroke-width="12" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="176,225 155,243 178,252" fill="#F5A623"/>

  <!-- THRYV wordmark -->
  <text x="232" y="304" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-weight="900" font-size="96" fill="white" letter-spacing="-3">THRYV</text>

  <!-- MARKETING SOLUTIONS subtitle -->
  <text x="235" y="338" font-family="Arial, sans-serif" font-weight="700" font-size="18" letter-spacing="5" fill="none">
    <tspan fill="#5B8FE0">MARKETING </tspan><tspan fill="#F5A623">SOLUTIONS</tspan>
  </text>

  <!-- Divider line -->
  <line x1="80" y1="378" x2="680" y2="378" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="80" y="426" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.70)" letter-spacing="0.5">AI-Powered Marketing. Real Growth. Zero Lock-Ins.</text>

  <!-- Domain -->
  <text x="80" y="480" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.35)" letter-spacing="1">thryvmarketingsolutions.com</text>

  <!-- Orange accent bar right side -->
  <rect x="1140" y="0" width="6" height="630" fill="#F5A623" opacity="0.6"/>

  <!-- Badge: Miami, FL -->
  <rect x="80" y="510" width="126" height="40" rx="20" fill="rgba(245,166,35,0.15)" stroke="#F5A623" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="143" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#F5A623" letter-spacing="1">Miami, FL</text>

  <!-- Badge: Month-to-Month -->
  <rect x="222" y="510" width="190" height="40" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="317" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="rgba(255,255,255,0.6)" letter-spacing="1">Month-to-Month</text>

  <!-- Badge: AI-Powered -->
  <rect x="428" y="510" width="154" height="40" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <text x="505" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="rgba(255,255,255,0.6)" letter-spacing="1">AI-Powered</text>
</svg>
